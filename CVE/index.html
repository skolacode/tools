<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CVE Dashboard</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #f8fafc;
    color: #1e293b;
    margin: 0;
    padding: 16px;
  }

  h1 {
    font-size: 20px;
    margin-bottom: 16px;
  }

  .container {
    max-width: 900px;
    margin: auto;
  }

  .grid {
    display: grid;
    gap: 12px;
  }

  .card {
    background: white;
    padding: 14px;
    border-radius: 10px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.05);
  }

  .cve-id {
    font-size: 16px;
    font-weight: bold;
    color: #dc2626;
    word-break: break-word;
  }

  .meta {
    font-size: 12px;
    color: #64748b;
    margin-top: 4px;
  }

  .badge {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 11px;
    margin-top: 6px;
    font-weight: 600;
  }

  .HIGH {
    background: #fee2e2;
    color: #b91c1c;
  }

  .MEDIUM {
    background: #fef3c7;
    color: #92400e;
  }

  .LOW {
    background: #dcfce7;
    color: #166534;
  }

  .desc {
    margin-top: 8px;
    font-size: 14px;
    line-height: 1.4;
  }

  .toggle {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    background: #f1f5f9;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
  }

  .details {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    margin-top: 10px;
    border-top: 1px solid #e2e8f0;
  }

  .details.open {
    max-height: 600px;
  }

  .details p {
    font-size: 13px;
    margin: 6px 0;
  }

  .ref {
    font-size: 12px;
    margin-top: 5px;
    word-break: break-word;
  }

  /* 📱 Tablet and up */
  @media (min-width: 640px) {
    body {
      padding: 24px;
    }

    h1 {
      font-size: 24px;
    }

    .card {
      padding: 16px;
    }

    .cve-id {
      font-size: 18px;
    }

    .desc {
      font-size: 15px;
    }

    .toggle {
      width: auto;
      padding: 8px 12px;
    }
  }
</style>

</head>

<body>

<h1>📊 CVE Dashboard</h1>

<p>Last updated: <span id="last-updated"></span></p>

<div id="cve-container" class="grid"></div>

<script>
const API_URL = "https://services.nvd.nist.gov/rest/json/cves/2.0?resultsPerPage=10&pubStartDate=2026-04-21T00:00:00.000&pubEndDate=2026-04-22T00:00:00.000&cvssV3Severity=HIGH";

const CACHE_KEY = "cve_cache";
const CACHE_DURATION = 6 * 60 * 60 * 1000; // 6 hours

function formatDate(dateStr) {
  return new Date(dateStr).toLocaleString();
}

function toggleDetails(id) {
  document.getElementById(id).classList.toggle("open");
}

function saveCache(data) {
  localStorage.setItem(CACHE_KEY, JSON.stringify({
    timestamp: Date.now(),
    data: data
  }));
}

function getCache() {
  const cache = localStorage.getItem(CACHE_KEY);
  if (!cache) return null;

  const parsed = JSON.parse(cache);

  if (Date.now() - parsed.timestamp > CACHE_DURATION) {
    return null; // expired
  }

  return parsed.data;
}

function render(data) {
  const container = document.getElementById("cve-container");
  container.innerHTML = "";

  data.vulnerabilities.forEach((item, index) => {
    const cve = item.cve;

    const id = cve.id;
    const desc = cve.descriptions?.[0]?.value || "";

    const published = formatDate(cve.published);
    const modified = formatDate(cve.lastModified);

    const cvss = cve.metrics?.cvssMetricV31?.[0]?.cvssData;
    const severity = cvss?.baseSeverity || "N/A";
    const score = cvss?.baseScore || "N/A";

    const refs = cve.references?.map(r =>
      `<div class="ref"><a href="${r.url}" target="_blank">${r.url}</a></div>`
    ).join("") || "N/A";

    const detailId = "d-" + index;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="cve-id">${id}</div>
      <div class="meta">Published: ${published}</div>
      <div class="meta">Updated: ${modified}</div>

      <div class="badge ${severity}">${severity} (${score})</div>

      <div class="desc">${desc}</div>

      <button class="toggle" onclick="toggleDetails('${detailId}')">
        View More
      </button>

      <div id="${detailId}" class="details">
        <p><strong>Vector:</strong> ${cvss?.vectorString || "N/A"}</p>
        <p><strong>Status:</strong> ${cve.vulnStatus}</p>
        <p><strong>References:</strong></p>
        ${refs}
      </div>
    `;

    container.appendChild(card);
  });
}

async function fetchCVEs() {
  const container = document.getElementById("cve-container");
  container.innerHTML = "Loading...";

  // 1. Try cache first
  const cached = getCache();
  if (cached) {
    console.log("Using cached data");
    render(cached);
    return;
  }

  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    saveCache(data); // save cache
    render(data);

  } catch (err) {
    container.innerHTML = "Failed to load CVEs.";
    console.error(err);
  }
}

// Auto load on page open
fetchCVEs();

// get the timestamp from the local storage and display it
const cache = localStorage.getItem(CACHE_KEY);
if (cache) {
  const parsed = JSON.parse(cache);
  document.getElementById("last-updated").textContent = formatDate(parsed.timestamp);
}

</script>

</body>
</html>
