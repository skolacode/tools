<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Islamic Dashboard</title>
  <style>
    :root { --primary: #2c3e50; --accent: #d35400; --bg: #f4f7f6; --card: #ffffff; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 450px; background: var(--card); padding: 24px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .section { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
    .label { font-size: 0.7rem; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; }
    .value { font-size: 1.1rem; font-weight: 600; color: var(--primary); display: block; margin-top: 5px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    
    /* Improved Fasting Grid */
    .fasting-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .fasting-item { background: #fff5eb; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #ffe5d0; }
    
    .prayer-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
    .prayer-item { background: #f8f9fa; padding: 10px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; }
    .prayer-label { font-size: 0.65rem; color: #7f8c8d; text-transform: uppercase; margin-bottom: 4px; }
    .prayer-value { font-size: 0.95rem; font-weight: 700; color: var(--primary); }
    .footer { font-size: 0.7rem; color: #999; margin-top: 15px; text-align: center; }
  </style>
</head>
<body>

<div class="container">
    <div class="section">
        <span class="label">Date</span>
        <span class="value" id="gregorian">--</span>
        <span class="value" id="hijri-local" style="color:var(--accent)">--</span>
    </div>

    <div class="section">
        <div class="grid">
            <div><span class="label">Eid al-Fitr</span><span class="value" id="eid-fitr">--</span></div>
            <div><span class="label">Eid al-Adha</span><span class="value" id="eid-adha">--</span></div>
        </div>
    </div>

    <div class="section">
        <span class="label">Best Fasting Days</span>
        <div class="fasting-grid">
            <div class="fasting-item">
                <span class="prayer-label">Arafah</span></br>
                <span class="prayer-value" id="arafah">26 May 2026</span>
            </div>
            <div class="fasting-item">
                <span class="prayer-label">Ashura</span></br>
                <span class="prayer-value" id="ashura">26 June 2026</span>
            </div>
        </div>
    </div>

    <div class="section" style="border:none">
        <span class="label">Prayer Times (Kuala Lumpur)</span>
        <div class="prayer-container">
            <div class="prayer-item"><span class="prayer-label">Fajr</span><span class="prayer-value" id="fajr">--</span></div>
            <div class="prayer-item"><span class="prayer-label">Dhuhr</span><span class="prayer-value" id="dhuhr">--</span></div>
            <div class="prayer-item"><span class="prayer-label">Asr</span><span class="prayer-value" id="asr">--</span></div>
            <div class="prayer-item"><span class="prayer-label">Maghrib</span><span class="prayer-value" id="maghrib">--</span></div>
            <div class="prayer-item"><span class="prayer-label">Isha</span><span class="prayer-value" id="isha">--</span></div>
        </div>
        <div class="footer" id="last-updated" style="margin-top: 15px;">--</div>
    </div>
</div>

<script>
    const STORAGE = { anchor: 'hijri_anchor', prayer: 'prayer_cache' };

    function updateUI() {
        const now = new Date();
        document.getElementById('gregorian').innerText = now.toLocaleDateString('en-GB', { dateStyle: 'long' });

        // Offline Hijri Calculation
        const anchor = JSON.parse(localStorage.getItem(STORAGE.anchor));
        if (anchor) {
            const diff = Math.floor((now - new Date(anchor.date)) / 86400000);
            const hDay = parseInt(anchor.hijri.day) + diff;
            document.getElementById('hijri-local').innerText = `${hDay} ${anchor.hijri.month.en} ${anchor.hijri.year} AH`;
            
            // Fixed Eid Dates for 1447 AH
            document.getElementById('eid-fitr').innerText = "20 March 2026";
            document.getElementById('eid-adha').innerText = "27 May 2026";
        }

        // Offline Prayers
        const pCache = JSON.parse(localStorage.getItem(STORAGE.prayer));
        if (pCache) {
            Object.keys(pCache.data).forEach(k => { if(document.getElementById(k.toLowerCase())) document.getElementById(k.toLowerCase()).innerText = pCache.data[k]});
            document.getElementById('last-updated').innerText = `Prayer times synced: ${new Date(pCache.timestamp).toLocaleDateString()}`;
        }
    }

    async function sync() {
        if (!navigator.onLine) return;
        const now = new Date();
        const anchor = JSON.parse(localStorage.getItem(STORAGE.anchor));
        const pCache = JSON.parse(localStorage.getItem(STORAGE.prayer));

        // Sync Hijri Anchor only on 28th of the month or if missing
        const is28thOrLater = !anchor || (parseInt(anchor.hijri.day) >= 28);
        const is10DaysOld = !pCache || (Date.now() - pCache.timestamp > 864000000);

        if (is28thOrLater || is10DaysOld) {
            const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=Kuala%20Lumpur&country=Malaysia&method=11`);
            const json = await res.json();
            if (is28thOrLater) localStorage.setItem(STORAGE.anchor, JSON.stringify({ date: now, hijri: json.data.date.hijri }));
            if (is10DaysOld) localStorage.setItem(STORAGE.prayer, JSON.stringify({ timestamp: Date.now(), data: json.data.timings }));
            updateUI();
        }
    }

    updateUI();
    sync();
</script>
</body>
</html>
