<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/favicons/favicon.ico" type="image/x-icon">
  <link rel="manifest" href="manifest.webmanifest">
  <title>Tools</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f0f2f5; /* Light grey background */
      display: flex;
      justify-content: center;
      align-items: flex-start;
      height: 100vh;
      padding-top: 50px;
    }

    /* Container for the menu */
    .menu-card {
      background: #ffffff;
      padding: 30px;
      border-radius: 20px; /* Rounded corners for the container */
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 300px;
      text-align: center;
    }

    /* Buttons */
    a.btn {
      display: block;
      padding: 15px;
      color: #fff;
      text-decoration: none;
      border-radius: 12px; /* Radius for buttons */
      margin: 15px 0;
      font-weight: 500;
      transition: transform 0.2s;
    }

    a.btn:active { transform: scale(0.98); }

    a.whatsapp { background-color: #25d366; }
    a.islamic { background-color: #ff5722; }
  </style>
</head>
<body>

  <div class="menu-card">
    <h3 style="margin-top: 0; color: #333;">Dashboard</h3>
    <a class="btn whatsapp" href="openwhatsapp">Whatsapp Tool</a>
    <a class="btn islamic" href="islamic-info">Islamic Info</a>
  </div>

</body>
</html>
