<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goto Whatsapp</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      margin-top: 40px;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: #ffffff;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .main-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-wrapper {
      display: flex;
      gap: 8px;
    }

    .pastedInput {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .pastedInput:focus {
      border-color: #1bfd6e;
      border-width: 2px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:active { transform: scale(0.98); }

    button.paste {
      background-color: #f1f5f9;
      color: #475569;
      width: 100%;
    }

    button#openWhatsApp {
      background-color: #25d366;
      color: #fff;
    }

    p#error {
      color: #ef4444;
      font-size: 14px;
      margin: 8px 0 0 0;
      min-height: 20px;
    }

    .clearInput {
      background-color: #e5e7eb;
      color: #374151;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="main-container">
      <button class="paste" onclick="paste()">📋 Paste Number</button>

      <div class="input-wrapper">
        <input type="text" name="pastedInput" id="pastedInput" class="pastedInput" placeholder="Enter number...">
        <button id="openWhatsApp" onclick="openWhatsapp(pastedInput.value)">Open</button>
        <!-- add a clear button -->
        <button onclick="clearInput()" class="clearInput">Clear</button>
      </div>
      
      <p id="error"></p>
    </div>
  </div>

  <script>
    const pastedInput = document.getElementById('pastedInput')

    function clearInput() {
      pastedInput.value = '';
      document.getElementById('error').innerText = '';
    }

    async function paste() {
      try {
        if (!navigator.clipboard) {
          alert("Clipboard API not supported in this browser.");
          return;
        }

        const clipboardText = await navigator.clipboard.readText();
        
        pastedInput.value = clipboardText

        const { isValid, formattedNumber, originalNumber } = validateMalaysianPhone(clipboardText);

        if (!isValid) {
          document.getElementById('error').innerText = 'Invalid Malaysian hand phone number';
          return;
        }

        document.getElementById('error').innerText = '';
      }
      catch (error) {
        console.log(error);
      }
    }

    function openWhatsapp(phoneNumber) {
      const url = `https://wa.me/${phoneNumber}`;
      window.open(url, '_blank');
    }

    function validateMalaysianPhone(phone) {
      let number = phone.replace(/\D/g, '');

      const createResponse = (isValid, message) => ({
        isValid,
        formattedNumber: isValid ? number : null,
        originalNumber: phone,
      });

      if (number.startsWith('0')) {
        const isStartingWith011 = number.startsWith('011');
        const validLength = isStartingWith011 ? 11 : 10;

        if (number.length !== validLength) {
          return createResponse(
            false,
            `Numbers starting with ${isStartingWith011 ? '011' : '0'} must be ${validLength} digits long`
          );
        }
        number = '6' + number;
      }

      if (!number.startsWith('60')) {
        return createResponse(false, 'Number must start with 60 or 0');
      }

      const isStartingWith6011 = number.startsWith('6011');
      const requiredLength = isStartingWith6011 ? 12 : 11;

      if (number.length !== requiredLength) {
        return createResponse(
          false,
          `Numbers starting with ${isStartingWith6011 ? '6011' : '60'} must be ${requiredLength} digits long`
        );
      }

      return createResponse(true, 'Valid Malaysian phone number');
    }
  </script>

</body>
</html>
